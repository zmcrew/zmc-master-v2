<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZM CREW | MASTER CONSOLE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500&family=Orbitron:wght@400;700&display=swap');
        :root { --neon-cyan: #00f3ff; --neon-green: #00ff41; --bg-deep: #030712; }
        body { background-color: var(--bg-deep); color: var(--neon-cyan); font-family: 'Fira Code', monospace; background-size: 40px 40px; overflow-x: hidden; }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        .glass-box { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(15px); border: 1px solid rgba(0, 243, 255, 0.2); box-shadow: 0 0 20px rgba(0, 243, 255, 0.1); border-radius: 12px; }
        .neon-text-cyan { color: var(--neon-cyan); text-shadow: 0 0 8px var(--neon-cyan); }
        .hacker-input { background: rgba(0, 0, 0, 0.6) !important; border: 1px solid var(--neon-cyan) !important; color: #fff !important; outline: none; transition: 0.3s; }
        .hacker-input:focus { box-shadow: 0 0 10px var(--neon-cyan); }
        .btn-cyber { background: transparent; border: 1px solid var(--neon-cyan); color: var(--neon-cyan); transition: 0.3s; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%); }
        .btn-cyber:hover { background: var(--neon-cyan); color: #000; box-shadow: 0 0 30px var(--neon-cyan); }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .online-glow { background: var(--neon-green); box-shadow: 0 0 8px var(--neon-green); }
        .offline-glow { background: #ff003c; box-shadow: 0 0 8px #ff003c; }
    </style>
</head>
<body class="min-h-screen">

    <div id="admin-login-layer" class="fixed inset-0 z-[200] bg-black flex items-center justify-center p-4">
        <div class="glass-box w-full max-w-md p-8 text-center animate__animated animate__fadeInDown">
            <img src="https://i.ibb.co/60PtNmBD/download.jpg" class="w-20 h-20 rounded-full mx-auto mb-6 border-2 border-cyan-500 shadow-lg shadow-cyan-500/50">
            <h2 class="orbitron text-xl font-bold mb-6 tracking-widest text-white">MASTER ACCESS</h2>
            <div class="space-y-4 text-left">
                <input type="text" id="admin-user-input" placeholder="ADMIN_ID" class="w-full hacker-input p-4 rounded-lg text-sm">
                <input type="password" id="admin-pass-input" placeholder="ADMIN_SECRET" class="w-full hacker-input p-4 rounded-lg text-sm">
                <button onclick="verifyAdmin()" id="btn-admin-login" class="w-full btn-cyber py-4 font-bold orbitron mt-4">UNSEAL_CONSOLE</button>
            </div>
            <p id="admin-error" class="text-red-500 text-[10px] mt-4 uppercase tracking-widest"></p>
        </div>
    </div>

    <div id="console-section" class="hidden min-h-screen p-4 md:p-8 animate__animated animate__fadeIn">
        <nav class="w-full glass-box p-4 mb-8 flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="flex items-center gap-5">
                <img src="https://i.ibb.co/60PtNmBD/download.jpg" class="w-14 h-14 rounded-full border border-cyan-500 shadow-lg shadow-cyan-500/30 object-cover" alt="ZM Crew Logo">
                <div>
                    <h2 class="orbitron text-xl font-bold text-white tracking-wider">ZM <span class="text-cyan-400">CREW</span></h2>
                    <div class="flex items-center text-[10px] uppercase tracking-tighter opacity-70">
                        <span class="status-dot online-glow"></span> MASTER CONSOLE ACTIVE
                    </div>
                </div>
            </div>
            <div class="text-center glass-box px-8 py-2 bg-cyan-500/5">
                <div id="live-clock" class="orbitron neon-text-cyan text-2xl font-bold tracking-widest">00:00:00</div>
                <div id="live-date" class="text-[10px] opacity-50 uppercase tracking-[0.5em]">DATE LOADING...</div>
            </div>
        </nav>

        <div class="max-w-7xl mx-auto space-y-6">
            <div class="grid grid-cols-2 md:grid-cols-2 gap-4">
                <div class="glass-box p-6 border-l-4 border-cyan-500">
                    <p class="text-[10px] opacity-40 uppercase mb-1">JUMLAH SUBJEK</p>
                    <p id="stat-total" class="text-4xl font-bold orbitron">00</p>
                </div>
                <div class="glass-box p-6 border-l-4 border-green-500">
                    <p class="text-[10px] opacity-40 uppercase mb-1">AKSES AKTIF</p>
                    <p id="stat-active" class="text-4xl font-bold orbitron text-green-400">00</p>
                </div>
            </div>

            <div class="glass-box p-4 flex flex-col md:flex-row gap-4 items-center">
                <input type="text" id="search-input" oninput="searchUser()" placeholder="CARI IDENTITI..." class="w-full hacker-input p-3 rounded-lg text-sm orbitron">
                <button onclick="showAddUserModal()" class="w-full md:w-auto btn-cyber px-10 py-3 font-bold orbitron text-sm">+ UPLOAD_USER</button>
            </div>

            <div id="user-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 pb-20"></div>
        </div>
    </div>

    <div id="user-modal" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center p-4 z-[110]">
        <div class="glass-box w-full max-w-lg p-8 animate__animated animate__zoomIn">
            <h3 id="modal-title" class="orbitron text-xl font-bold mb-8 text-white border-b border-cyan-500/30 pb-4">DATA_OVERRIDE</h3>
            <input type="hidden" id="edit-doc-id">
            <div class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] text-cyan-500 mb-1 block">USERNAME</label>
                        <input type="text" id="form-username" class="w-full hacker-input p-3 rounded-lg text-sm">
                    </div>
                    <div>
                        <label class="text-[10px] text-cyan-500 mb-1 block">PASSWORD</label>
                        <input type="text" id="form-password" class="w-full hacker-input p-3 rounded-lg text-sm">
                    </div>
                </div>
                <div>
                    <label class="text-[10px] text-cyan-500 mb-1 block uppercase">Device ID (Kosongkan untuk Reset)</label>
                    <input type="text" id="form-deviceid" placeholder="AUTO_RECORDED" class="w-full hacker-input p-3 rounded-lg text-xs font-mono">
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] text-cyan-500 mb-1 block">STATUS</label>
                        <select id="form-status" class="w-full hacker-input p-3 rounded-lg text-sm">
                            <option value="ACTIVE">AUTHORIZED</option>
                            <option value="disekat">REVOKED</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[10px] text-cyan-500 mb-1 block">EXPIRY DATE</label>
                        <input type="date" id="form-expiry" class="w-full hacker-input p-3 rounded-lg text-sm">
                    </div>
                </div>
            </div>
            <div class="flex gap-4 mt-10">
                <button onclick="saveUser()" class="flex-grow btn-cyber py-4 font-bold orbitron">EXECUTE_PATCH</button>
                <button onclick="closeModal()" class="px-8 border border-slate-700 text-slate-500 orbitron text-xs">BATAL</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, getDoc, updateDoc, addDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCrSMWPiFLhP8SzWMvZG0WcuwbIkLKjrws",
            authDomain: "zonemasta-panel.firebaseapp.com",
            databaseURL: "https://zonemasta-panel-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "zonemasta-panel",
            storageBucket: "zonemasta-panel.firebasestorage.app",
            messagingSenderId: "82335500997",
            appId: "1:82335500997:web:c9a98eba582fee3092feac"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const clientsRef = collection(db, 'users');
        
        let allUsers = [];

        // --- FUNGSI ADMIN LOGIN DARI FIREBASE ---
        window.verifyAdmin = async function() {
            const userInput = document.getElementById('admin-user-input').value;
            const passInput = document.getElementById('admin-pass-input').value;
            const errorEl = document.getElementById('admin-error');
            const btn = document.getElementById('btn-admin-login');

            btn.innerText = "VERIFYING...";
            
            try {
                // Ambil data dari koleksi admin_config
                const adminRef = doc(db, "admin_config", "master_key");
                const snap = await getDoc(adminRef);

                if (snap.exists()) {
                    const data = snap.data();
                    if (userInput === data.admin_user && passInput === data.admin_pass) {
                        document.getElementById('admin-login-layer').classList.add('hidden');
                        document.getElementById('console-section').classList.remove('hidden');
                        init(); // Jalankan console
                    } else {
                        errorEl.innerText = "ACCESS_DENIED: WRONG_CREDENTIALS";
                    }
                } else {
                    errorEl.innerText = "ERROR: ADMIN_CONFIG_NOT_FOUND";
                }
            } catch (e) {
                errorEl.innerText = "CONNECTION_ERROR";
            }
            btn.innerText = "UNSEAL_CONSOLE";
        };

        // --- FUNGSI ASAL CONSOLE ---
        function updateClock() {
            const now = new Date();
            document.getElementById('live-clock').innerText = now.toLocaleTimeString('en-GB', { hour12: false });
            document.getElementById('live-date').innerText = now.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' }).toUpperCase();
        }
        setInterval(updateClock, 1000);

        async function init() {
            try { await signInAnonymously(auth); listenToUsers(); } 
            catch (e) { console.error("Ralat Sambungan"); }
        }

        function listenToUsers() {
            onSnapshot(clientsRef, (snapshot) => {
                allUsers = [];
                snapshot.forEach(doc => allUsers.push({ id: doc.id, ...doc.data() }));
                renderCards(allUsers);
                updateStats();
            });
        }

        window.renderCards = function(users) {
            const container = document.getElementById('user-container');
            container.innerHTML = '';
            users.forEach(user => {
                const isAktif = user.status === 'ACTIVE';
                const card = document.createElement('div');
                card.className = "glass-box p-5 user-card transition-all border-t-2 " + (isAktif ? 'border-green-500' : 'border-red-500');
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <h4 class="orbitron font-bold text-white text-lg">${user.username || 'N/A'}</h4>
                        </div>
                        <span class="text-[9px] font-bold px-2 py-1 rounded border ${isAktif ? 'border-green-500 text-green-400' : 'border-red-500 text-red-500'}">
                            ${isAktif ? 'AUTHORIZED' : 'REVOKED'}
                        </span>
                    </div>
                    <div class="space-y-2 mb-4 text-xs font-mono">
                        <div class="flex justify-between"><span class="opacity-40">PASS:</span> <span>${user.password}</span></div>
                        <div class="flex justify-between"><span class="opacity-40">EXP:</span> <span>${user.expiryDate || 'N/A'}</span></div>
                        <div class="mt-2 pt-2 border-t border-cyan-900/30">
                            <span class="opacity-40 block text-[9px] mb-1">DEVICE_ID:</span>
                            <span class="text-cyan-400 truncate block text-[10px]">${user.deviceId || 'NOT_LINKED'}</span>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="openEditModal('${user.id}')" class="flex-1 bg-cyan-500/10 hover:bg-cyan-500 text-cyan-500 hover:text-black py-2 rounded text-[10px] orbitron transition-all">EDIT</button>
                        <button onclick="deleteUser('${user.id}')" class="px-3 bg-red-500/10 hover:bg-red-500 text-red-500 hover:text-white py-2 rounded transition-all">PADAM</button>
                    </div>`;
                container.appendChild(card);
            });
        };

        window.saveUser = async function() {
            const id = document.getElementById('edit-doc-id').value;
            const data = {
                username: document.getElementById('form-username').value,
                password: document.getElementById('form-password').value,
                status: document.getElementById('form-status').value,
                expiryDate: document.getElementById('form-expiry').value,
                deviceId: document.getElementById('form-deviceid').value || null,
                updatedAt: serverTimestamp()
            };
            try {
                if (id) { await updateDoc(doc(db, 'users', id), data); } 
                else { 
                    data.createdAt = serverTimestamp();
                    await addDoc(clientsRef, data); 
                }
                closeModal();
            } catch (e) { alert("ERROR: " + e.message); }
        };

        window.deleteUser = async function(id) {
            if(confirm("PADAM SUBJEK INI?")) { await deleteDoc(doc(db, 'users', id)); }
        };

        window.searchUser = function() {
            const q = document.getElementById('search-input').value.toLowerCase();
            const filtered = allUsers.filter(u => u.username.toLowerCase().includes(q));
            renderCards(filtered);
        };

        function updateStats() {
            document.getElementById('stat-total').innerText = allUsers.length.toString().padStart(2, '0');
            document.getElementById('stat-active').innerText = allUsers.filter(u => u.status === 'ACTIVE').length.toString().padStart(2, '0');
        }

        window.showAddUserModal = () => {
            document.getElementById('modal-title').innerText = "UPLOAD_NEW_USER";
            document.getElementById('edit-doc-id').value = "";
            document.getElementById('form-username').value = "";
            document.getElementById('form-password').value = "";
            document.getElementById('form-deviceid').value = "";
            document.getElementById('user-modal').classList.remove('hidden');
        };

        window.openEditModal = (id) => {
            const u = allUsers.find(x => x.id === id);
            document.getElementById('modal-title').innerText = "PATCH_USER_DATA";
            document.getElementById('edit-doc-id').value = id;
            document.getElementById('form-username').value = u.username;
            document.getElementById('form-password').value = u.password;
            document.getElementById('form-status').value = u.status;
            document.getElementById('form-expiry').value = u.expiryDate || "";
            document.getElementById('form-deviceid').value = u.deviceId || "";
            document.getElementById('user-modal').classList.remove('hidden');
        };

        window.closeModal = () => document.getElementById('user-modal').classList.add('hidden');
    </script>
</body>
</html>
