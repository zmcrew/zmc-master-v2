firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// ================= DEVICE ID =================
function getDeviceId(){
    return btoa(navigator.userAgent + screen.width + Intl.DateTimeFormat().resolvedOptions().timeZone).substring(0,16);
}

// ================= LOGIN =================
async function handleLogin(){
    const user = document.getElementById('user-input').value.trim();
    const pass = document.getElementById('pass-input').value.trim();
    const error = document.getElementById('error-msg');

    if(!user || !pass){
        error.innerText = "Isi semua maklumat!";
        return;
    }

    try{
        error.innerText = "Menyemak akses...";
        const email = user.toLowerCase() + "@zonemasta.app";
        await auth.signInWithEmailAndPassword(email, pass);

            showBlock("ID anda tiada dalam pangkalan data.");

        }

        const data = snap.data();
        const myId = getDeviceId();

        if(data.deviceId && data.deviceId !== myId){

// ================= LIVE SESSION =================
function startSession(uid){
    // Tukar baris ini juga
const ref = db.collection("public").doc("data").collection("clients").doc(uid);


    ref.onSnapshot(doc => {
        if(!doc.exists) { location.reload(); return; }
        const d = doc.data();
        const now = new Date();

        if(d.status === "EXPIRED" || d.status === "BLOCKED" || d.status === "disekat"){
            showBlock("Akses anda telah tamat atau disekat oleh pihak admin.");
            return;
        }

        if(d.expiryDate && now > d.expiryDate.toDate()){
            showBlock("Tempoh langganan anda sudah tamat.");
            return;
        }

        if(d.deviceId !== getDeviceId()){
            showBlock("Sila gunakan peranti asal anda.");
            return;
        }

        showApp();
    });

    setInterval(() => {
        ref.update({ lastActive: new Date(), online: true }).catch(()=>{});
    }, 15000);
}

// ================= UI CONTROL =================
function showBlock(msg){
    document.getElementById("login-form").classList.add("hidden-el");
    document.getElementById("main-content").classList.add("hidden-el");
    document.getElementById("blocked-msg").classList.remove("hidden-el");
    document.getElementById("block-reason").innerText = msg;
}

function showApp(){
    document.getElementById("security-layer").classList.add("hidden-el");
    document.getElementById("main-content").classList.remove("hidden-el");
    
    setTimeout(()=>{
        window.location.href = "https://www.grab.com/my/driver/";
    }, 2000);
}

function logout(){
    auth.signOut().then(() => { location.reload(); });
}
