<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZMC System Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        body { background:#000; color:#fff; font-family:sans-serif; margin:0; overflow:hidden; }
        .hidden-el { display:none !important; }
        .lock-screen { position:fixed; inset:0; display:flex; justify-content:center; align-items:center; flex-direction:column; padding:20px; background: radial-gradient(circle, #051911 0%, #000000 100%); overflow-y: auto; }
        .input-box { background:#111; border:1px solid #333; padding:14px; width:100%; margin-bottom:10px; border-radius:10px; color:#fff; outline:none; }
        .input-box:focus { border-color: #10b981; }
        .btn-login { background:#10b981; color:#000; padding:14px; width:100%; border-radius:10px; font-weight:bold; transition: 0.3s; }
        .logo-img { width: 100px; height: 100px; object-fit: cover; margin: 0 auto 20px; border-radius: 50%; border: 2px solid #10b981; box-shadow: 0 0 15px rgba(16, 185, 129, 0.4); }
        .warning-box { background: rgba(255, 0, 0, 0.1); border: 1px solid rgba(255, 255, 0, 0.3); padding: 12px; border-radius: 10px; margin-top: 20px; text-align: left; }
    </style>
</head>
<body>

<div id="security-layer" class="lock-screen">
    <div id="login-form" class="w-full max-w-md text-center">
        <img src="https://i.ibb.co/60PtNmBD/download.jpg" class="logo-img">
        <h1 class="text-2xl font-bold text-emerald-500 mb-2">ZM CREW SYSTEM</h1>
        <p class="text-gray-400 mb-6 text-sm">Sila masukkan akses anda</p>

        <input id="user-input" placeholder="Username" class="input-box">
        <input id="pass-input" type="password" placeholder="Password" class="input-box">

        <button onclick="handleLogin()" class="btn-login shadow-lg shadow-emerald-500/20 uppercase">LOGIN SYSTEM</button>
        <p id="error-msg" class="text-red-500 mt-3 text-sm font-medium"></p>
        
        <div class="warning-box">
            <p class="text-yellow-500 font-bold text-xs mb-1">⚠️ PERINGATAN:</p>
            <p class="text-gray-300 text-[10px] leading-relaxed">Gunakan Fungsi MOD Mengikut Keperluan. Resiko tanggung sendiri.</p>
        </div>
    </div>

    <div id="blocked-msg" class="hidden-el text-center p-6 border border-red-900 bg-red-950/20 rounded-2xl max-w-sm">
        <img src="https://i.ibb.co/60PtNmBD/download.jpg" class="logo-img border-red-500">
        <h2 class="text-red-500 text-xl font-bold mb-2">AKSES DITOLAK</h2>
        <p id="block-reason" class="text-gray-300 text-sm mb-4">Akses anda telah digantung oleh pihak admin.</p>
        <button onclick="location.reload()" class="mt-6 text-gray-500 underline text-xs">Cuba Lagi</button>
    </div>
</div>

<div id="main-content" class="hidden-el lock-screen">
    <div class="animate-pulse flex flex-col items-center">
        <div class="w-12 h-12 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="text-emerald-500 font-medium tracking-widest text-sm">MEMBINA SESI SELAMAT...</p>
    </div>
</div>

<script>
// Konfigurasi Firebase anda
const firebaseConfig = {
  apiKey: "AIzaSyCrSMWPiFLhP8SzWMvZG0WcuwbIkLKjrws",
  authDomain: "zonemasta-panel.firebaseapp.com",
  projectId: "zonemasta-panel",
  storageBucket: "zonemasta-panel.firebasestorage.app",
  messagingSenderId: "82335500997",
  appId: "1:82335500997:web:c9a98eba582fee3092feac"
};

// Initialize Firebase
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let activeListener = null;

async function handleLogin() {
    const user = document.getElementById('user-input').value.trim();
    const pass = document.getElementById('pass-input').value.trim();
    const error = document.getElementById('error-msg');

    if(!user || !pass) { 
        error.innerText = "Isi maklumat!"; 
        return; 
    }

    error.innerText = "Menyemak...";
    error.classList.remove('text-red-500');
    error.classList.add('text-emerald-500');

    // Matikan listener lama jika ada
    if(activeListener) activeListener();

    // 1. Point ke Document User (Koleksi mesti bernama 'users')
    const userRef = db.collection("users").doc(user);

    // 2. Gunakan onSnapshot untuk Real-time Updates
    activeListener = userRef.onSnapshot((doc) => {
        if (doc.exists) {
            const data = doc.data();

            // 3. Semak Password
            if (data.password === pass) {
                
                // 4. SEMAK STATUS (Sama ada 'status' string atau 'isLocked' boolean)
                if (data.status === "blocked" || data.isLocked === true) {
                    showBlockedScreen(data.reason || "Akses anda telah digantung oleh admin.");
                } else {
                    showMainContent();
                }

            } else {
                error.innerText = "Password salah!";
                error.classList.replace('text-emerald-500', 'text-red-500');
            }
        } else {
            error.innerText = "User tidak wujud dalam pangkalan data!";
            error.classList.replace('text-emerald-500', 'text-red-500');
        }
    }, (err) => {
        error.innerText = "Ralat Firebase: " + err.message;
        error.classList.replace('text-emerald-500', 'text-red-500');
    });
}

function showBlockedScreen(reason) {
    document.getElementById('login-form').classList.add('hidden-el');
    document.getElementById('main-content').classList.add('hidden-el');
    document.getElementById('blocked-msg').classList.remove('hidden-el');
    document.getElementById('block-reason').innerText = reason;
}

function showMainContent() {
    document.getElementById('login-form').classList.add('hidden-el');
    document.getElementById('blocked-msg').classList.add('hidden-el');
    document.getElementById('main-content').classList.remove('hidden-el');
    
    // Di sini anda boleh masukkan kod untuk redirect ke dashboard anda
    console.log("Akses Dibenarkan. Membuka sistem...");
}
</script>

</body>
</html>
