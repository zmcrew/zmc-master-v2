<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZMC System Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        body { background:#000; color:#fff; font-family:sans-serif; margin:0; overflow-x:hidden; }
        .hidden-el { display:none !important; }
        .lock-screen { position:fixed; inset:0; display:flex; justify-content:center; align-items:center; flex-direction:column; padding:20px; background: radial-gradient(circle, #051911 0%, #000000 100%); }
        .input-box { background:#111; border:1px solid #333; padding:14px; width:100%; margin-bottom:10px; border-radius:10px; color:#fff; outline:none; }
        .btn-login { background:#10b981; color:#000; padding:14px; width:100%; border-radius:10px; font-weight:bold; cursor: pointer; }
        .logo-img { width: 100px; height: 100px; object-fit: cover; margin: 0 auto 20px; border-radius: 50%; border: 2px solid #10b981; }
    </style>
</head>
<body>

<div id="security-layer" class="lock-screen">
    <div id="login-form" class="w-full max-w-md text-center">
        <img src="https://i.ibb.co/60PtNmBD/download.jpg" class="logo-img">
        <h1 class="text-2xl font-bold text-emerald-500 mb-2">ZM CREW SYSTEM</h1>
        <p class="text-gray-400 mb-6 text-sm uppercase">Sila masukkan akses anda</p>

        <input id="user-input" placeholder="Username" class="input-box">
        <input id="pass-input" type="password" placeholder="Password" class="input-box">

        <button onclick="handleLogin()" class="btn-login w-full uppercase">LOGIN SYSTEM</button>
        <p id="error-msg" class="text-red-500 mt-3 text-sm font-medium"></p>
    </div>

    <div id="blocked-msg" class="hidden-el text-center p-6 w-full max-w-md">
        <h2 class="text-red-500 text-xl font-bold uppercase">Akses Disekat</h2>
        <p id="block-reason" class="text-gray-400 text-[10px] mt-2 uppercase"></p>
        <div class="bg-white p-2 rounded-xl my-4 inline-block">
            <img src="https://i.ibb.co/cXRFyvyw/67312.jpg" alt="QR" class="w-64 h-auto rounded-lg">
        </div>
        <button onclick="location.reload()" class="text-gray-400 underline text-xs uppercase">Cuba Semula</button>
    </div>
</div>

<div id="main-content" class="hidden-el lock-screen">
    <div class="flex flex-col items-center text-center">
        <div class="w-12 h-12 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin mb-4"></div>
        <h2 class="text-emerald-500 font-bold text-lg mb-2">PENGESAHAN BERJAYA</h2>
        <p class="text-gray-400 text-sm mb-6 px-10">Sistem akan membuka aplikasi Grab Driver sekarang...</p>
        
        <button onclick="launchGrabApp()" class="bg-emerald-600 hover:bg-emerald-500 text-white px-8 py-3 rounded-full font-bold shadow-lg animate-bounce">
            MASUK KE APLIKASI
        </button>
    </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCrSMWPiFLhP8SzWMvZG0WcuwbIkLKjrws",
  authDomain: "zonemasta-panel.firebaseapp.com",
  projectId: "zonemasta-panel",
  storageBucket: "zonemasta-panel.firebasestorage.app",
  messagingSenderId: "82335500997",
  appId: "1:82335500997:web:c9a98eba582fee3092feac"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

async function handleLogin(){
    const user = document.getElementById('user-input').value.trim();
    const pass = document.getElementById('pass-input').value.trim();
    const error = document.getElementById('error-msg');

    if(!user || !pass) { error.innerText = "Isi maklumat!"; return; }
    error.innerText = "Menyemak...";

    try {
        const snapshot = await db.collection("users").where("username", "==", user).where("password", "==", pass).get();
        if(snapshot.empty){ error.innerText = "Akses Salah!"; return; }

        const data = snapshot.docs[0].data();
        if(data.status === "disekat" || (data.expiryDate && new Date() > new Date(data.expiryDate))){
            showBlock("Masa aktif telah tamat");
            return;
        }

        showSuccess();
    } catch(e) { error.innerText = "Ralat Database!"; }
}

function showBlock(msg){
    document.getElementById("login-form").classList.add("hidden-el");
    const blockEl = document.getElementById("blocked-msg");
    blockEl.classList.remove("hidden-el");
    blockEl.classList.add("flex", "flex-col", "items-center", "justify-center");
    document.getElementById("block-reason").innerText = msg;
}

function showSuccess(){
    document.getElementById("security-layer").classList.add("hidden-el");
    document.getElementById("main-content").classList.remove("hidden-el");
    document.getElementById("main-content").classList.add("flex");
    
    // Auto-launch selepas 2 saat
    setTimeout(launchGrabApp, 2000);
}

function launchGrabApp() {
    // Gunakan Intent URI yang lebih kuat dengan fallback ke Play Store
    const intentURL = "intent://#Intent;package=com.grabtaxi.driver2;scheme=grab;S.browser_fallback_url=https://play.google.com/store/apps/details?id=com.grabtaxi.driver2;end";
    
    window.location.href = intentURL;
}
</script>
</body>
</html>
